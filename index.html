function openRidHistoryModal(docId) {
  const db = firebase.firestore();
  db.collection('ridhistory').doc(docId).get().then(snap => {
    if (!snap.exists) {
      showToast('Registro não encontrado', 'error');
      return;
    }
    const data = snap.data();
    const changesBlock = renderChangesBlock(data);
    showModalHTML(`Histórico RID #${escapeHtml(data.ridId || '')}`, changesBlock);
  }).catch(err => {
    console.error(err);
    showToast('Erro ao abrir histórico: ' + (err.message || err), 'error');
  });
}

function renderChangesBlock(data) {
  // aceita dois formatos: object changes {field:{from,to}} ou array changes [{field,from,to}]
  const changes = data.changes || data.changeSet || data.diff || null;

  if (!changes) {
    // fallback: mostra o documento inteiro (legível)
    return `<pre class="text-sm text-gray-700 whitespace-pre-wrap">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
  }

  let rows = [];

  if (Array.isArray(changes)) {
    rows = changes.map(c => ({
      field: c.field || c.key || '—',
      from: c.from === undefined ? '' : c.from,
      to: c.to === undefined ? '' : c.to
    }));
  } else {
    // objeto
    for (const k of Object.keys(changes)) {
      const v = changes[k] || {};
      rows.push({
        field: k,
        from: v.from === undefined ? '' : v.from,
        to: v.to === undefined ? '' : v.to
      });
    }
  }

  if (rows.length === 0) {
    return `<p class="text-sm text-gray-600">Nenhuma alteração detalhada disponível.</p>`;
  }

  return `
    <div class="space-y-3">
      ${rows.map(r => `
        <div class="border rounded p-3 bg-gray-50">
          <div class="text-xs text-gray-500">${escapeHtml(String(r.field))}</div>
          <div class="mt-1 flex gap-4">
            <div class="flex-1">
              <div class="text-xs text-red-600 font-semibold">Antes</div>
              <div class="text-sm text-gray-800 whitespace-pre-line">${escapeHtml(String(r.from === null ? '' : r.from))}</div>
            </div>
            <div class="flex-1">
              <div class="text-xs text-green-600 font-semibold">Depois</div>
              <div class="text-sm text-gray-800 whitespace-pre-line">${escapeHtml(String(r.to === null ? '' : r.to))}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function escapeHtml(s) {
  if (s === undefined || s === null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function logRidHistory({

  before,
  after
}) {
  const user = auth.currentUser;

  const userSnap = await getDoc(doc(db, "users", user.uid));
  const userData = userSnap.exists() ? userSnap.data() : {};

  await addDoc(collection(db, "ridHistory"), {
    ridId,
    ridNumber,
    action,
    changedFields: Object.keys(after || {}),
    before: before || {},
    after: after || {},
    byUid: user.uid,
    byName: userData.name || "Desconhecido",
    byRole: userData.role || "não definido",
    at: serverTimestamp()
  });
}

async function generateRiskReportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const logo = await loadImageAsBase64('logo.png');
  const now = new Date().toLocaleString();

  let base = window.devFilteredBase || allRids;

  base = base.filter(r => ['Médio', 'Alto', 'Crítico'].includes(r.riskClassification));

  const month = document.getElementById('devMonth')?.value || 'Todos';
  const year = document.getElementById('devYear')?.value || new Date().getFullYear();

  // Agrupar por setor
  const sectors = {};
  base.forEach(r => {
    const s = r.sector || 'SEM SETOR';
    if (!sectors[s]) sectors[s] = [];
    sectors[s].push(r);
  });

  const totalCritical = base.filter(r => r.riskClassification === 'Crítico').length;
  const totalHigh = base.filter(r => r.riskClassification === 'Alto').length;
  const totalMedium = base.filter(r => r.riskClassification === 'Médio').length;
  const total = totalCritical + totalHigh + totalMedium;

  const pctCritical = ((totalCritical / total) * 100).toFixed(1);
  const pctHigh = ((totalHigh / total) * 100).toFixed(1);
  const pctMedium = ((totalMedium / total) * 100).toFixed(1);

  // Ranking
  const ranking = Object.entries(sectors)
    .map(([sector, data]) => ({
      sector,
      critical: data.filter(r => r.riskClassification === 'Crítico').length
    }))
    .sort((a, b) => b.critical - a.critical);

  // ===== Pizza real =====
  function drawPie(doc, cx, cy, r, values, colors) {
    const sum = values.reduce((a, b) => a + b, 0);
    let start = -Math.PI / 2;

    values.forEach((v, i) => {
      const angle = (v / sum) * Math.PI * 2;
      const end = start + angle;

      const points = [[cx, cy]];
      for (let a = start; a <= end; a += 0.05) {
        points.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
      }
      points.push([cx + r * Math.cos(end), cy + r * Math.sin(end)]);

      doc.setFillColor(...colors[i]);
      doc.path(points, 'F');

      start = end;
    });
  }

  // ==================== PÁGINA EXECUTIVA ====================
  doc.addImage(logo, 'PNG', 14, 10, 30, 20);
  doc.setFontSize(18);
  doc.text('Relatório de Gestão de Risco', 50, 20);
  doc.setFontSize(10);
  doc.text(`Gerado em: ${now}`, 50, 28);
  doc.text(`Período: ${month}/${year}`, 14, 40);

  doc.setFontSize(13);
  doc.text('Distribuição de Risco', 14, 55);

  // Barras
  doc.setFillColor(220,80,80); doc.rect(60, 60, pctCritical, 8, 'F');
  doc.setFillColor(240,160,50); doc.rect(60, 75, pctHigh, 8, 'F');
  doc.setFillColor(80,180,120); doc.rect(60, 90, pctMedium, 8, 'F');

  doc.setDrawColor(200);
  doc.rect(60, 60, 100, 8);
  doc.rect(60, 75, 100, 8);
  doc.rect(60, 90, 100, 8);

  doc.text(`Crítico (${pctCritical}%)`, 14, 66);
  doc.text(`Alto (${pctHigh}%)`, 14, 81);
  doc.text(`Médio (${pctMedium}%)`, 14, 96);

  // Pizza
  drawPie(doc, 150, 80, 20, [totalCritical, totalHigh, totalMedium], [
    [220,80,80],
    [240,160,50],
    [80,180,120]
  ]);

  // Ranking
  doc.setFontSize(13);
  doc.text('Setores mais críticos', 14, 130);

  doc.autoTable({
    startY: 135,
    head: [['Posição', 'Setor', 'RIDs Críticas']],
    body: ranking.map((r, i) => [i + 1, r.sector, r.critical]),
    headStyles: { fillColor: [200,80,80], textColor: 255 }
  });

  // ==================== POR SETOR ====================
  for (const sector in sectors) {
    const data = sectors[sector];
    doc.addPage();

    doc.addImage(logo, 'PNG', 14, 10, 30, 20);
    doc.setFontSize(16);
    doc.text('Relatório de Gestão de Risco', 50, 20);
    doc.setFontSize(10);
    doc.text(`Gerado em: ${now}`, 50, 28);

    doc.setFontSize(14);
    doc.text(`SETOR: ${sector}`, 14, 40);

    const critical = data.filter(r => r.riskClassification === 'Crítico');
    const high = data.filter(r => r.riskClassification === 'Alto');
    const medium = data.filter(r => r.riskClassification === 'Médio');

    doc.autoTable({
      startY: 50,
      head: [['Indicador', 'Qtd']],
      body: [
        ['Críticas', critical.length],
        ['Altas', high.length],
        ['Médias', medium.length],
        ['Total', data.length]
      ],
      headStyles: { fillColor: [100,150,180], textColor: 255 }
    });

    doc.autoTable({
      startY: doc.lastAutoTable.finalY + 8,
      head: [['RID', 'Emitente', 'Risco', 'Status']],
      body: data.map(r => [
        `#${r.ridNumber}`,
        r.emitterName || '',
        r.riskClassification,
        r.status
      ]),
      alternateRowStyles: { fillColor: [245,248,250] },
      headStyles: { fillColor: [50,100,160], textColor: 255 }
    });
  }

  doc.save(`Relatorio_Gestao_Risco_${month}_${year}.pdf`);

async function loadImageAsBase64(url) {
  const res = await fetch(url);
  const blob = await res.blob();

  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

    async function updateRequestsBadge() {
      if (!isDeveloper()) return;
      
      const badge = document.getElementById('requestsBadge');
      if (!badge) return;

      try {
        const ridRequestsSnapshot = await db.collection('deleteRequests')
          .where('status', '==', 'pending')
          .get();
        const ridCount = ridRequestsSnapshot.docs.length;

        const empRequestsSnapshot = await db.collection('employeeDeleteRequests')
          .where('status', '==', 'pending')
          .get();
        const empCount = empRequestsSnapshot.docs.length;

        const totalCount = ridCount + empCount;

        if (totalCount > 0) {
          badge.textContent = totalCount > 9 ? '9+' : totalCount;
          badge.classList.remove('hidden');
        } else {
          badge.classList.add('hidden');
        }
      } catch (error) {
        console.error('Error updating requests badge:', error);
      }
    }
