function getSearchSelectedMonthYear() {
  const now = new Date();
  const monthEl = document.getElementById('searchMonth');
  const yearEl = document.getElementById('searchYear');

  const month = monthEl?.value ? Number(monthEl.value) : (now.getMonth() + 1);
  const year = yearEl?.value ? Number(yearEl.value) : now.getFullYear();

  return { month, year };
}

function isInMonthYear(d, month, year) {
  return d && d.getFullYear() === year && (d.getMonth() + 1) === month;
}

function isBeforeMonthYear(d, month, year) {
  if (!d) return false;
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  return (y < year) || (y === year && m < month);
}

function splitRidsForSearchView(baseRids, month, year) {
  const clean = (baseRids || []).filter(r => !r?.deleted);

  // ✅ RIDs do mês selecionado (qualquer status)
  const monthRids = clean
    .filter(r => {
      const d = getEmissionDateOnly(r);
      return isInMonthYear(d, month, year);
    })
    .sort((a, b) => {
      const da = getEmissionDateOnly(a);
      const db = getEmissionDateOnly(b);
      return (db?.getTime?.() || 0) - (da?.getTime?.() || 0);
    });

  // 🚨 Atrasados = emitidos antes do mês selecionado e AINDA PENDENTES
  const atrasados = clean
    .filter(r => {
      const d = getEmissionDateOnly(r);
      if (!isBeforeMonthYear(d, month, year)) return false;

      const st = String(r.status || '').toUpperCase();
      const isPendente = (st !== 'CORRIGIDO' && st !== 'ENCERRADO' && st !== 'EXCLUIDO');
      return isPendente;
    })
    // (opcional) mais antigos primeiro pra dar senso de prioridade
    .sort((a, b) => {
      const da = getEmissionDateOnly(a);
      const db = getEmissionDateOnly(b);
      return (da?.getTime?.() || 0) - (db?.getTime?.() || 0);
    });

  return { atrasados, monthRids };
}

// ---------- VERSÃO CORRIGIDA (substitui listenRidsRealtimeEmployee inteira) ----------
function listenRidsRealtimeEmployee() {
  if (!currentUser || !currentUser.uid) {
    console.warn('listenRidsRealtimeEmployee: usuário não disponível');
    return () => {};
  }

  // cancela listeners antigos, se houver
  if (window.unsubscribeRids) {
    try { window.unsubscribeRids(); } catch(e) {}
    window.unsubscribeRids = null;
  }

  const myUid = currentUser.uid;
  const myCpf = currentUserData?.cpf ? String(currentUserData.cpf).trim() : null;

  // mapa para acumular DocumentSnapshots (key = doc.id)
  const docsMap = new Map();
  const unsubs = [];

  function normDoc(doc) {
    return { id: doc.id, ...doc.data() };
  }

  function mergeAndPublish() {
    const byRid = new Map();
    const byId = new Map();

    docsMap.forEach(doc => {
      const d = normDoc(doc);
      const ridNumber = (d.ridNumber || '').toString().trim();
      const key = ridNumber || d.id;

      if (key && byRid.has(key)) {
        const exist = byRid.get(key);
        const existScore = (Object.keys(exist).length) + ((exist.createdAt && exist.createdAt.toMillis) ? exist.createdAt.toMillis()/1e13 : 0);
        const newScore = (Object.keys(d).length) + ((d.createdAt && d.createdAt.toMillis) ? d.createdAt.toMillis()/1e13 : 0);
        if (newScore > existScore) byRid.set(key, d);
      } else if (key) {
        byRid.set(key, d);
      } else {
        if (!byId.has(d.id)) byId.set(d.id, d);
      }
    });

    const combined = [...Array.from(byRid.values()), ...Array.from(byId.values())];

    combined.sort((a,b) => {
      const ta = (a.createdAt && a.createdAt.toMillis) ? a.createdAt.toMillis() : (a.emissionDate && a.emissionDate.toMillis ? a.emissionDate.toMillis() : 0);
      const tb = (b.createdAt && b.createdAt.toMillis) ? b.createdAt.toMillis() : (b.emissionDate && b.emissionDate.toMillis ? b.emissionDate.toMillis() : 0);
      return tb - ta;
    });

    window.allRids = combined;

    // publica UI uma única vez na próxima iteração do loop
    setTimeout(() => {
      try {
        if (window.currentPage === 'dashboard') renderDashboard();
        if (window.currentPage === 'search') renderSearchPage();
        if (window.currentPage === 'designated') renderDesignatedPage();
        if (typeof renderRidsListUI === 'function') renderRidsListUI(combined);
      } catch (e) {
        console.warn('Erro ao re-renderizar após mesclar RIDs:', e);
      }
    }, 0);
  }

  // Listener A: emitterId == uid
  try {
    const q1 = db.collection('rids').where('emitterId', '==', myUid);
    const unsub1 = q1.onSnapshot(snap => {
      snap.docs.forEach(d => docsMap.set(d.id, d));
      mergeAndPublish();
    }, err => {
      console.warn('Erro listener emitterId:', err);
    });
    unsubs.push(unsub1);
  } catch (e) {
    console.warn('Erro iniciando listener emitterId:', e);
  }

  // Lista de nomes de campo possíveis usados para CPF pelo site público
  const cpfFieldCandidates = ['emitterCpf', 'cpf', 'emitter_document', 'emitterDocument', 'document'];

  // Listener(s) por CPF (cria apenas se myCpf existir)
  if (myCpf) {
    const createdFields = new Set();
    cpfFieldCandidates.forEach(fieldName => {
      // evita criar duas queries para o mesmo fieldName
      if (createdFields.has(fieldName)) return;
      try {
        const q = db.collection('rids').where(fieldName, '==', myCpf);
        const unsub = q.onSnapshot(snap => {
          snap.docs.forEach(d => docsMap.set(d.id, d));
          mergeAndPublish();
        }, err => {
          // erros aqui são só log (campo pode não existir)
          console.debug(`Erro listener cpf field ${fieldName}:`, err && err.code ? err.code : err);
        });
        unsubs.push(unsub);
        createdFields.add(fieldName);
      } catch (e) {
        console.debug('Ignorando listener cpf field', fieldName, e);
      }
    });
  }

  // Listener opcional: _importedFrom == 'public-site' (se vocês usarem essa marcação)
  try {
    const qImport = db.collection('rids').where('_importedFrom', '==', 'public-site');
    const unsubImport = qImport.onSnapshot(snap => {
      snap.docs.forEach(d => docsMap.set(d.id, d));
      mergeAndPublish();
    }, err => {
      console.debug('Listener _importedFrom erro (pode exigir índice):', err);
    });
    unsubs.push(unsubImport);
  } catch (e) {
    console.debug('Ignorando listener _importedFrom:', e);
  }

  // função para cancelar todos os listeners
  window.unsubscribeRids = function() {
    unsubs.forEach(u => {
      try { u && u(); } catch(e){}
    });
    window.unsubscribeRids = null;
  };

  window.allRidsStarted = true;
  return window.unsubscribeRids;
}

function getMonthStartEnd(date = new Date()) {
  const start = new Date(date.getFullYear(), date.getMonth(), 1, 0, 0, 0, 0);
  const end = new Date(date.getFullYear(), date.getMonth() + 1, 0, 23, 59, 59, 999);
  return { start, end };
}

function isResolvedStatus(status) {
  const st = String(status || '').toUpperCase();

}

function calcMyPerformanceStats(myRids) {
  const clean = (myRids || []).filter(r => !r?.deleted);

  const upper = (v) => String(v || '').toUpperCase();

  // ✅ CONTAGEM GERAL (vida toda) -> para os cards
  const total = clean.length;
  const corrigidos = clean.filter(r => upper(r.status) === 'CORRIGIDO').length;
  const emAndamento = clean.filter(r => upper(r.status) === 'EM ANDAMENTO').length;
  const vencidos = clean.filter(r => upper(r.status) === 'VENCIDO').length;

  // ✅ MÊS ATUAL (para a linha de baixo)
  const { start, end } = getMonthStartEnd(new Date());
  const monthRids = clean.filter(r => {
    const d = r.createdAt?.toDate?.();
    return d && d >= start && d <= end;
  });

  const monthTotal = monthRids.length;

  // ✅ meta pessoal (mês)
  const metaPessoal = 4;
  const bateuMeta = monthTotal >= metaPessoal;
  const faltamMeta = Math.max(metaPessoal - monthTotal, 0);

  return {
    // cards (geral)
    total,
    corrigidos,
    emAndamento,
    vencidos,

    // linha de baixo (mês atual)
    monthTotal,
    metaPessoal,
    bateuMeta,
    faltamMeta
  };
}

    return (

        maiorNumero = num;
      }
    } else {
      ridsSemNumero.push(doc.ref);
    }
  });

  let proximo = maiorNumero;

  for (const ref of ridsSemNumero) {
    proximo++;
    const ridNumber = String(proximo).padStart(5, "0");

    await ref.update({ ridNumber });
  }

  console.log("✅ Numeração de RIDs garantida");
}

    async function updateRid(ridId, updates) {
      try {
      // =========================
  // 🔔 Validação de STATUS
  // =========================
  if (updates.status) {

   // CORRIGIDO (somente Ações Corretivas obrigatórias)
if (updates.status === 'CORRIGIDO') {
  if (!updates.correctiveActions || updates.correctiveActions.trim() === '') {
    showToast(
      '⚠️ Para status "CORRIGIDO", é obrigatório preencher Ações Corretivas.',
      'error'
    );
    return false;
  }
}


    // ENCERRADO
    if (updates.status === 'ENCERRADO') {
      if (
        !updates.observations || updates.observations.trim() === '' ||
        !updates.conclusion || updates.conclusion.trim() === ''
      ) {
        showToast(
          '⚠️ Para status "ENCERRADO", é obrigatório preencher Observações e Conclusão.',
          'error'
        );
        return false;
      }
    }

    // VENCIDO → não valida nada
  }

    // Se virou CORRIGIDO, grava data
    if (updates.status === 'CORRIGIDO' && !updates.conclusionDate) {
      updates.conclusionDate = firebase.firestore.FieldValue.serverTimestamp();
    }

    const ridSnap = await db.collection('rids').doc(ridId).get();
    const rid = ridSnap.exists ? { id: ridSnap.id, ...ridSnap.data() } : null;


if (!rid) {
  showToast('RID não encontrada', 'error');
  return false;
}

if (rid.deleted) {
  showToast('RID removido não pode ser alterado', 'error');
  return false;
}

// 📩 Se trocou (ou removeu) o líder, reativa envio do e-mail (Worker)
if (Object.prototype.hasOwnProperty.call(updates, 'responsibleLeader')) {
  const newLeader = updates.responsibleLeader || null;
  const oldLeader = rid?.responsibleLeader || null;

  if (newLeader !== oldLeader) {
    updates.emailSent = false;
    updates.emailSentAt = null;
    updates.lastNotifiedLeader = null;
  }
}



await db.collection('rids').doc(ridId).update(updates);

// 🧾 Auditoria (comparação profunda e normalizada)
// Substitui o loop simples para evitar gravar valores idênticos (ex.: mesma emissionDate).
const changes = {};

// normaliza valores para comparação
function normalizeForCompare(val) {
  if (val === null || val === undefined) return null;

  // Firestore Timestamp-like ({ seconds, nanoseconds })
  if (typeof val === 'object' && val !== null && ('seconds' in val)) {
    const nanos = val.nanoseconds || 0;
    return (Number(val.seconds) * 1000) + Math.round(nanos / 1e6);
  }

  // Date object
  if (val instanceof Date) return val.getTime();

  // números / boolean já ok
  if (typeof val === 'number' || typeof val === 'boolean') return val;

  // objetos/arrays
  if (typeof val === 'object') {
    try {
      return JSON.stringify(val);
    } catch (e) {
      return String(val);
    }
  }

  // string
  return String(val).trim();
}

// compara cada campo de updates com o valor atual do rid
for (const key in updates) {
  const beforeRaw = rid ? rid[key] : null;
  const afterRaw = updates[key];

  const before = normalizeForCompare(beforeRaw);
  const after  = normalizeForCompare(afterRaw);

  if (before !== after) {
    changes[key] = {
      from: beforeRaw === undefined ? null : beforeRaw,
      to:   afterRaw  === undefined ? null : afterRaw
    };
  }
}

// --- INICIO: grava auditoria na coleção ridHistory ---
try {
  if (Object.keys(changes).length > 0) {
    await db.collection('ridHistory').add({
      // 🔹 Identificação do RID
      ridId: ridId,
      ridNumber: rid?.ridNumber || null,

      // 🔹 Dados fixos do RID (AGORA VÃO APARECER NA TELA)
      emitterName: rid?.emitterName || null,

      leaderName: rid?.responsibleLeaderName || null,

      // 🔹 Quem fez a alteração
      changedBy: {
        uid: currentUser?.uid || null,
        name: currentUserData?.name || null,
        role: currentUserData?.isDeveloper
          ? 'DEVELOPER'
          : (currentUserData?.isAdmin ? 'ADMIN' : 'USER')
      },

      // 🔹 O que mudou
      changes: changes,

      // 🔹 Snapshot antes da alteração
      before: {
        status: rid?.status || null,
        responsibleLeaderName: rid?.responsibleLeaderName || null
      },

      meta: {
        page: window.currentPage || null,
        userAgent: navigator.userAgent
      },

      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
} catch (err) {
  // Se houver problema ao gravar o histórico, logamos mas NÃO interrompemos o fluxo.
  console.warn('Erro ao gravar ridHistory (não bloqueante):', err);
}
 // --- FIM: grava auditoria ---

// 🔔 Notifica admins (se houve mudança de status)
if (updates.status) {
  try {
    const adminUsers = (allUsers || []).filter(u => u.isAdmin && (u.uid || u.id) !== currentUser?.uid);

    const adminPromises = adminUsers.map(admin => {
      const targetId = admin.uid || admin.id;
      return createNotification(targetId, {
        type: 'rid_status_changed',
        ridId: ridId,
        ridNumber: rid?.ridNumber || '',
        title: 'Status da RID atualizado',
        message: `RID #${rid?.ridNumber} foi atualizada para: ${updates.status}`,
        ridLocation: rid?.location || '',
        deadline: null
      }).catch(e => {
        console.warn('Erro ao notificar admin', targetId, e);
      });
    });

    // dispara em paralelo, não bloqueante (se quiser aguardar, transforme a função em async e use await)
    Promise.all(adminPromises).catch(e => {
      console.warn('Erro no Promise.all das notificações admin:', e);
    });
  } catch (e) {
    console.warn('Erro no fluxo de notificação para admins:', e);
  }
}

// 🔔 Notifica responsável (se o editor for Developer e leader existe e for diferente do editor)
// versão não-blocking também
if (
  currentUserData?.isDeveloper &&
  rid?.responsibleLeader &&
  rid.responsibleLeader !== currentUser?.uid
) {
  createNotification(rid.responsibleLeader, {
    type: 'rid_updated',
    ridId: ridId,
    ridNumber: rid?.ridNumber || '',
    title: 'RID atualizada',
    message: `A RID #${rid?.ridNumber} foi atualizada por ${currentUserData?.name || 'um usuário'}`,
    ridLocation: rid?.location || '',
    deadline: null
  }).catch(e => {
    console.warn('Erro ao notificar responsável:', e);
  });
}

    // 🧹 Fecha o modal de detalhes
    document.querySelectorAll('.modal-backdrop').forEach(m => m.remove());

    // 🔥 NÃO usa loadRids — realtime já atualiza
    // 🔒 Proteção de role
if (!currentUserData?.isAdmin && !currentUserData?.isDeveloper) {
  renderEmployeeDashboard();
} else {
  renderAdminDashboard();
}
    if (window.currentPage === 'search') renderSearchPage();
    if (window.currentPage === 'designated') renderDesignatedPage();

    showToast('RID atualizada com sucesso!');
    return true;
 } catch (error) {
  console.error("Erro Firestore:", error);

  // Se o erro for só da auditoria, ignoramos
  if (
    error.code === 'permission-denied' ||
    error.message?.includes('Missing or insufficient permissions')
  ) {
    showToast('RID atualizada com sucesso!');

  }

async function requestRidDeletion(ridId, reason) {
  // helper: tenta fechar modais conhecidos / overlays
  function closePossibleModals() {
    // lista de ids/classes que seu projeto pode usar para modais
    const possibleSelectors = [
      '#rid-detail-modal',            // exemplo: modal do RID
      '#request-rid-modal',           // exemplo: modal de "Solicitar Remoção"
      '#delete-request-modal',        // variação possível

      '.modal',                       // qualquer modal que use essa classe
      '.overlay',                     // overlays genéricos
      '[data-modal="true"]'           // seletor genérico se usar data-modal
    ];

    // remove elementos que casarem
    possibleSelectors.forEach(sel => {
      try {
        document.querySelectorAll(sel).forEach(el => {
          el.remove();
        });
      } catch (e) {
        // ignore
      }
    });

    // também procura por elementos com ids que comecem com 'reject-modal-' (variante)
    try {
      document.querySelectorAll('[id^="reject-modal-"]').forEach(el => el.remove());
    } catch (e) {}

    // restaura scroll da página (caso tenha sido travado)
    try { document.documentElement.style.overflow = ''; } catch (e) {}
  }

  try {
    // busca dado canônico do RID direto no Firestore (mais seguro que usar allRids)
    const ridDoc = await db.collection('rids').doc(ridId).get();
    if (!ridDoc.exists) {
      showToast('RID não encontrado.', 'error');
      return;
    }
    const rid = { id: ridDoc.id, ...ridDoc.data() };

    // tenta obter o nome do emitente (opcional)
    let emitterName = rid.emitterName || null;
    if (!emitterName && rid.emitterId) {
      try {
        const userDoc = await db.collection('users').doc(rid.emitterId).get();
        if (userDoc.exists) {
          const u = userDoc.data();
          emitterName = u?.name || u?.displayName || u?.fullName || null;
        }
      } catch (err) {
        console.warn('Não foi possível buscar usuário do emitterId:', err);
      }
    }

    // grava a solicitação incluindo a descrição e o nome do emitter (se quiser manter)
    const docRef = await db.collection('deleteRequests').add({
      ridId: ridId,
      ridNumber: rid?.ridNumber || null,
      ridDescription: rid?.description || null,
      ridEmitterName: emitterName,
      requesterId: currentUser.uid,
      requesterName: currentUserData.name,
      reason: reason,
      status: 'pending',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Notify developers (se tiver essa lógica)
    const developerUsers = (Array.isArray(allUsers) ? allUsers : []).filter(u => u.isDeveloper);
    for (const dev of developerUsers) {
      try {
        await createNotification(dev.id, {
          type: 'deletion_request',
          ridId: ridId,
          ridNumber: rid.ridNumber,
          title: 'Nova Solicitação de Exclusão',
          message: `${currentUserData.name} solicitou exclusão do RID #${rid.ridNumber}`,
          ridLocation: rid.location || null,
          deadline: null
        });
      } catch (e) {
        console.warn('Erro ao notificar dev', e);
      }
    }

    // FECHAR MODAIS: garante que qualquer overlay/modal relacionado seja removido
    closePossibleModals();

    // atualizar UI
    if (typeof renderRequestsPage === 'function') renderRequestsPage();
    showToast('Solicitação de exclusão enviada aos desenvolvedores!');
  } catch (error) {
    console.error('requestRidDeletion erro:', error);
    showToast('Erro ao solicitar exclusão: ' + (error.message || error), 'error');
  } finally {
    // seguro: garante que modais não fiquem travados nem overflow ativo
    try { document.documentElement.style.overflow = ''; } catch (e) {}
  }
}

  const header = document.createElement('div');

  header.innerHTML = `
    <div>
      <h3 class="text-lg font-semibold">Motivo da recusa</h3>

      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  `;

  // body (textarea)
  const body = document.createElement('div');
  body.className = 'mb-4';
  body.innerHTML = `
    <label class="block text-sm font-medium text-gray-700 mb-2">Motivo<span class="text-red-500 ml-1">*</span></label>
  `;
  const textarea = document.createElement('textarea');
  textarea.className = 'w-full border rounded-md p-3 resize-y min-h-[90px] focus:outline-none focus:ring-2 focus:ring-indigo-300';
  textarea.placeholder = 'Descreva o motivo da recusa...';
  textarea.maxLength = 1000;
  textarea.setAttribute('aria-label', 'Motivo da recusa');
  body.appendChild(textarea);

  // footer (buttons)
  const footer = document.createElement('div');
  footer.className = 'flex items-center justify-end space-x-3';
  footer.innerHTML = `
    <button type="button" id="reject-modal-cancel-${requestId}" class="px-4 py-2 rounded-lg text-sm font-medium border hover:opacity-90">Cancelar</button>
    <button type="button" id="reject-modal-confirm-${requestId}" class="px-4 py-2 rounded-lg text-sm font-semibold bg-red-600 text-white hover:opacity-95">Recusar</button>
  `;

  // montagem
  modal.appendChild(header);
  modal.appendChild(body);
  modal.appendChild(footer);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  // prevent background scroll
  const previousOverflow = document.documentElement.style.overflow;
  document.documentElement.style.overflow = 'hidden';

  // foco inicial
  textarea.focus();

  // helper: remover modal
  function closeModal() {
    document.documentElement.style.overflow = previousOverflow || '';
    const el = document.getElementById(`reject-modal-${requestId}`);
    if (el) el.remove();
  }

  // ação de cancelar / fechar
  document.getElementById(`reject-modal-close-${requestId}`).addEventListener('click', closeModal);
  document.getElementById(`reject-modal-cancel-${requestId}`).addEventListener('click', closeModal);

  // fechar com ESC
  function onKeyDown(e) {
    if (e.key === 'Escape') closeModal();
  }
  document.addEventListener('keydown', onKeyDown);

  // confirmar recusa
  document.getElementById(`reject-modal-confirm-${requestId}`).addEventListener('click', async () => {
    const reason = textarea.value.trim();
    if (!reason) {
      // simples feedback inline
      textarea.focus();
      textarea.classList.add('ring-2', 'ring-red-200');
      setTimeout(() => textarea.classList.remove('ring-2', 'ring-red-200'), 1200);
      return;
    }

    // desativa botões enquanto grava
    const confirmBtn = document.getElementById(`reject-modal-confirm-${requestId}`);
    const cancelBtn = document.getElementById(`reject-modal-cancel-${requestId}`);
    confirmBtn.disabled = true;
    cancelBtn.disabled = true;
    confirmBtn.classList.add('opacity-60', 'cursor-not-allowed');

    try {
      // se você já tem uma função rejectRidDeletionRequest(requestId, reason) use-a.
      // Senão, abaixo tem um exemplo simples de gravação no Firestore (comente/ajuste conforme seu projeto).
      if (typeof rejectRidDeletionRequest === 'function') {
        await rejectRidDeletionRequest(requestId, reason);
      } else {
        // Exemplo genérico: atualiza o deleteRequest para 'rejected'
        await db.collection('deleteRequests').doc(requestId).update({
          status: 'rejected',
          reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
          reviewedBy: {
            uid: currentUser.uid,
            name: currentUserData?.name || ''
          },
          rejectionReason: reason
        });
      }

      // callback opcional
      if (typeof onConfirmed === 'function') {
        try { onConfirmed(requestId, reason); } catch (err) { /* swallow */ }
      }

      showToast('Solicitação rejeitada com sucesso!');
      closeModal();
    } catch (err) {
      console.error('Erro ao rejeitar solicitação:', err);
      showToast('Erro ao rejeitar: ' + (err.message || err), 'error');
      confirmBtn.disabled = false;
      cancelBtn.disabled = false;
      confirmBtn.classList.remove('opacity-60', 'cursor-not-allowed');
    } finally {
      document.removeEventListener('keydown', onKeyDown);
    }
  });
}

async function deleteRid(ridId, reason) {

  try {

  const ridSnap = await ridRef.get();

  if (!ridSnap.exists) {
    throw new Error('RID não encontrada para exclusão');
  }

  const ridData = ridSnap.data() || {};
  const previousObs = ridData?.observations || '';

  const safeReason = (reason || '').trim() || 'Solicitação de exclusão aprovada';

  const deleteNote =
`[${new Date().toLocaleDateString('pt-BR')}] RID removido do sistema
Motivo: ${safeReason}
Removido por: ${currentUserData?.name || 'DEV'}`;

  await ridRef.update({
    deleted: true,
    status: 'EXCLUIDO',
    deletedAt: firebase.firestore.FieldValue.serverTimestamp(),

    deletedBy: {
      uid: currentUser?.uid || null,
      name: currentUserData?.name || 'DEV',
      role: isDeveloper() ? 'DEVELOPER' : 'ADMIN'
    },

    // ✅ aqui fica o motivo “limpo” pra UI usar direto
    deleteReason: safeReason,

    // ✅ aqui fica o histórico em observações (como você quer ver no modal)
    observations: previousObs ? (previousObs + '\n\n' + deleteNote) : deleteNote,

    // (mantém seu comportamento saudável)
    emailSent: false,
    emailSentAt: null,
    lastNotifiedLeader: null
  });
  } finally {
    window.unblockAutoRender();
  }
}

async function approveRidDeletionRequest(requestId) {
  // bloqueia (contador)
  window.blockAutoRender();

  try {
    if (!isDeveloper()) {
      showToast('Acesso negado', 'error');
      return;
    }

    const reqRef = db.collection('deleteRequests').doc(requestId);
    const reqSnap = await reqRef.get();
    if (!reqSnap.exists) {
      showToast('Solicitação não encontrada', 'error');
      return;
    }

    const req = reqSnap.data();
    const ridId = req?.ridId;
    const reason = (req?.reason || '').trim() || 'Aprovado';

    if (!ridId) {
      showToast('Solicitação inválida (ridId ausente)', 'error');
      return;
    }

    // 1) marca como approved (opcional antes da exclusão)
    await reqRef.update({
      status: 'approved',
      reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
      reviewedBy: {
        uid: currentUser.uid,
        name: currentUserData?.name || 'DEV'
      }
    });

    // 2) garante que deleteRid rode com block ativo.
    //    se deleteRid faz várias escritas, é bom que ela não libere o render por dentro.
    if (typeof deleteRid === 'function') {
      await deleteRid(ridId, reason);
    } else {
      // fallback - tenta apagar se não tiver sua função custom
      await db.collection('rids').doc(ridId).delete();
    }

    showToast('Solicitação aprovada e RID removido!');
  } catch (error) {
    console.error('Erro approveRidDeletionRequest:', error);
    showToast('Erro ao aprovar solicitação: ' + (error.message || error), 'error');
  } finally {
    // pequena espera pra snapshots se estabilizarem (evita piscar)
    setTimeout(() => {
      try {
        // libera o bloqueio
        window.unblockAutoRender();

        // força página de solicitações e re-render único e definitivo
        window.currentPage = 'requests'; // garanta que sua lógica de rotas use esse id; ajuste se for outro
        if (typeof renderRequestsPage === 'function') renderRequestsPage();

        // opcional: atualiza o card também
        if (typeof renderDeleteRequestsCard === 'function') renderDeleteRequestsCard();
      } catch (e) {
        console.warn('Erro ao finalizar approveRidDeletionRequest:', e);
      }
    }, 300); // 300ms é mais seguro; se estiver lento, pode reduzir a 150ms
  }
}

        name: currentUserData?.name || 'DEV'

  }
}

// substitua totalmente a função anterior por esta
function renderRidHistoryPage() {
  try {
    const container = document.getElementById('ridHistoryContainer');
    if (!container) return;

    // limpa só o conteúdo interno
    container.innerHTML = '';

    if (!allRidHistory || allRidHistory.length === 0) {
      container.innerHTML = `<p class="text-gray-600">Nenhuma alteração registrada ainda.</p>`;
      return;
    }

    // helper seguro de escape (se você já tiver, não faz mal repetir)
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // helpers de formatação de datas
    function toDateObject(raw) {
      if (!raw) return null;
      try {
        // Firestore Timestamp
        if (typeof raw === 'object' && raw !== null && typeof raw.toDate === 'function') return raw.toDate();
        // { seconds, nanoseconds }
        if (typeof raw === 'object' && raw !== null && 'seconds' in raw) return new Date(Number(raw.seconds) * 1000);
        // Date
        if (raw instanceof Date) return raw;
        // string / number
        const n = Number(raw);
        if (!isNaN(n)) return new Date(n);
        const parsed = Date.parse(String(raw));
        return isNaN(parsed) ? null : new Date(parsed);
      } catch (e) {
        return null;
      }
    }

    function formatDateOnly(raw) {
      const d = toDateObject(raw);
      if (!d) return '—';
      return d.toLocaleDateString('pt-BR');
    }

    function formatTimeOnly(raw) {
      const d = toDateObject(raw);
      if (!d) return '—';
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    // ordenar por createdAt desc (mais recentes primeiro)
    const list = [...allRidHistory].sort((a, b) => {
      const da = toDateObject(a.createdAt) || new Date(0);
      const db = toDateObject(b.createdAt) || new Date(0);
      return db - da;
    });

    // gerar linhas com cuidado com aspas no onclick (escape seguro)
    const rows = list.map(h => {
      const ridNumber = h.ridNumber || h.ridId || '-';

      // emitter: tenta vários campos possíveis

      // quem alterou: aceita string ou objeto {name, uid} ou campos legacy
      let who = '—';
      if (!h.changedBy && (h.changedByName || h.user)) {
        who = h.changedByName || h.user;
      } else if (typeof h.changedBy === 'string') {
        who = h.changedBy;
      } else if (h.changedBy && typeof h.changedBy === 'object') {
        who = h.changedBy.name || h.changedBy.uid || h.changedBy.email || h.changedById || '—';
      }

      if ((!who || who === '—') && (h.changedByName || h.changedByDisplayName)) {
        who = h.changedByName || h.changedByDisplayName;
      }

      const date = formatDateOnly(h.createdAt);
      const time = formatTimeOnly(h.createdAt);
      const histIdRaw = h.id || h.ridHistoryId || '';
      // escape simples para dentro de atributo JS
      const histIdEsc = String(histIdRaw).replace(/'/g, "\\'").replace(/\n/g, '');

      return `
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 px-4 py-3 flex items-center gap-4 text-sm">
          <div class="w-28 flex-none font-semibold text-sky-700 truncate">#${escapeHtml(String(ridNumber))}</div>
          <div class="flex-1 text-gray-700 truncate">${escapeHtml(String(emitter))}</div>
          <div class="flex-1 text-gray-700 truncate">${escapeHtml(String(who || '—'))}</div>
          <div class="w-36 text-gray-600 text-xs">${escapeHtml(String(date))}</div>
          <div class="w-20 text-gray-600 text-xs">${escapeHtml(String(time))}</div>
          <div class="w-24 text-right">
            <button
              class="text-xs px-3 py-1 rounded-md border border-orange-300 text-orange-600 bg-orange-50 hover:bg-orange-100 transition-colors"
              onclick="(function(){ if(typeof openRidFromHistory === 'function'){ try{ openRidFromHistory('${histIdEsc}'); }catch(e){ console.warn('openRidFromHistory error', e); } } })();">
              ver
            </button>
          </div>
        </div>
      `;
    }).join('');

    container.innerHTML = rows;
  } catch (err) {

    console.error('Erro em renderRidHistoryPage:', err);

    if (container) container.innerHTML = '<p class="text-red-600">Erro ao renderizar histórico. Veja console.</p>';
  }
}

    function getRidDateSafe(r) {
  if (r?.emissionDate && typeof r.emissionDate.toDate === "function") {
    return r.emissionDate.toDate();
  }
  if (r?.createdAt && typeof r.createdAt.toDate === "function") {
    return r.createdAt.toDate();
  }
  if (r?.date) {
    const d = new Date(r.date + "T00:00:00");
    return isNaN(d.getTime()) ? null : d;
  }
  return null;
}

    function getEmployeesWithoutRidsThisMonth(allUsers, filteredRids) {
  const now = new Date();

  // setor selecionado no filtro da dashboard
  const sectorSelect = document.getElementById('dashboardSector');
  const selectedSector = sectorSelect?.value || '';

  // quem emitiu RID no mês (já respeita mês + setor)
  const emittersThisMonth = new Set(
    filteredRids
      .map(r => r.emitterId)
      .filter(Boolean)
  );

  return allUsers
    // somente funcionários
    .filter(u => true)

    // 🔥 FILTRO POR SETOR (AQUI ESTAVA FALTANDO)
    .filter(u => !selectedSector || u.sector === selectedSector)

    // 🔥 remove quem emitiu RID no mês
    .filter(u => !emittersThisMonth.has(u.id))

    .map(u => {
      // última RID do funcionário (se existir)
      const lastRid = allRids.filter(r => !r.deleted)
        .filter(r => r.emitterId === u.id && r.emissionDate)
        .sort((a, b) => {
  const da = getRidDateSafe(a);
  const db = getRidDateSafe(b);
  // quem não tem data vai pro final
  if (!da && !db) return 0;
  if (!da) return 1;
  if (!db) return -1;
  return db - da;
})[0];

      let lastDate = null;
let daysWithout = null;

if (lastRid) {
  lastDate = getRidDateSafe(lastRid);

  if (lastDate) {
    daysWithout = Math.floor(
      (now - lastDate) / (1000 * 60 * 60 * 24)
    );
  }
}

      return {
        id: u.id,
        name: u.name,
        lastDate,      // null → nunca emitiu
        daysWithout    // null → nunca emitiu
      };
    });
}

function hideDeletedRidTooltip() {

}

function moveDeletedRidTooltip(mouseEvent) {
  if (!deletedRidTooltipEl || deletedRidTooltipEl.style.display === 'none') return;

  const padding = 14;
  const x = mouseEvent.clientX + padding;
  const y = mouseEvent.clientY + padding;

  const rect = deletedRidTooltipEl.getBoundingClientRect();
  const maxX = window.innerWidth - rect.width - 10;
  const maxY = window.innerHeight - rect.height - 10;

  deletedRidTooltipEl.style.left = Math.min(x, maxX) + 'px';
  deletedRidTooltipEl.style.top  = Math.min(y, maxY) + 'px';
}

// evita XSS/HTML quebrado
function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function renderDeleteRequestsCard() {
  const container = document.getElementById('deleteRequestsCardContainer');
  if (!container) return;

  // escape simples
  function escapeHtmlSimple (str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  if (!allDeleteRequests.length) {
    container.innerHTML = `
      <div class="bg-white rounded-xl shadow-md p-4">
        <div class="font-bold text-gray-800">Histórico de solicitações</div>
        <div class="text-xs text-gray-500 mt-2">Nenhuma solicitação ainda.</div>
      </div>
    `;
    return;
  }

  // badge de status
  function statusBadge(status) {
    const s = (status || 'pending').toString().toLowerCase();
    if (s === 'approved' || s === 'aprovado') {
      return '<span class="inline-block text-xs font-semibold px-3 py-1 rounded-full bg-green-50 text-green-700">APROVADO</span>';
    }
    if (s === 'rejected' || s === 'rejeitado') {
      return '<span class="inline-block text-xs font-semibold px-3 py-1 rounded-full bg-red-50 text-red-700">REJEITADO</span>';
    }
    return '<span class="inline-block text-xs font-semibold px-3 py-1 rounded-full bg-yellow-50 text-yellow-700">PENDENTE</span>';
  }

  const isDashboard = window.currentPage === 'dashboard';

  // monta linhas (renderizamos todas, mas o wrapper controla a rolagem)
  const rows = allDeleteRequests.map(req => {
    const ridNumber = req.ridNumber || req.ridId || '—';
    const emitter = req.ridEmitterName || req.emitterName || req.requesterName || '—';
    const status = req.status || 'pending';
    const desc = (req.ridDescription || '').toString().replace(/\n/g, ' ').trim();
    const reqReason = (req.reason || '').toString().replace(/\n/g, ' ').trim();
    const rejectionReason = (req.rejectionReason || req.rejectReason || req.rejection || '').toString().replace(/\n/g, ' ').trim();

    const actions =
      !isDashboard && (status === 'pending' || status.toLowerCase() === 'pending')
        ? `<div class="flex items-center gap-2 ml-3">
             <button onclick="approveRidDeletionRequest('${req.id}')" class="px-2 py-1 text-xs rounded border bg-green-50 text-green-700 hover:opacity-90">Aprovar</button>
             <button onclick="rejectRidDeletionRequest('${req.id}')" class="px-2 py-1 text-xs rounded border bg-red-50 text-red-700 hover:opacity-90">Rejeitar</button>
           </div>`
        : '';

    return `
      <div
        class="flex items-center justify-between px-4 py-3 border-b last:border-b-0 req-row"
        data-req-id="${escapeHtmlSimple(req.id)}"
        data-rid-number="${escapeHtmlSimple(ridNumber)}"
        data-emitter="${escapeHtmlSimple(emitter)}"
        data-desc="${escapeHtmlSimple(desc)}"
        data-req-reason="${escapeHtmlSimple(reqReason)}"
        data-rejection="${escapeHtmlSimple(rejectionReason)}"
        data-status="${escapeHtmlSimple(status)}"
        tabindex="0"
        role="button"
        aria-label="Solicitação RID ${escapeHtmlSimple(ridNumber)} - ${escapeHtmlSimple(emitter)}"
      >
        <div class="flex items-center gap-4 min-w-0">
          <div class="w-28 text-sm font-semibold text-gray-800 truncate">RID ${escapeHtmlSimple(ridNumber)}</div>
          <div class="min-w-0">
            <div class="text-sm text-gray-600 truncate">${escapeHtmlSimple(emitter)}</div>
          </div>
        </div>

        <div class="flex items-center gap-3 ml-4">
          <div>${statusBadge(status)}</div>
          ${actions}
        </div>
      </div>
    `;
  }).join('');

  // === Aqui: wrapper com rolagem interna limitada a 15 itens ===
  // Ajuste maxHeight se suas linhas forem mais altas/baixas.
  // 15 linhas * ~48px = 720px (valor aproximado). Se souber a altura exata da sua linha, ajuste.
  const listMaxHeight = 772; // px — altere pra 15 * altura_da_linha se necessário

  container.innerHTML = `
    <div class="bg-white rounded-xl shadow-md w-full max-w-4xl mx-auto">
      <div class="px-4 py-3 border-b font-bold text-gray-800">
        Histórico de Solicitações <span class="text-sm text-gray-400">(${allDeleteRequests.length})</span>
      </div>

      <div id="deleteRequestsListInner" class="overflow-y-auto" style="max-height: ${listMaxHeight}px;">
        ${rows}
      </div>
    </div>
  `;

  // --- POPOVER LOGIC (mesma lógica anterior) ---
  let popover = document.getElementById('req-hover-popover');
  if (!popover) {
    popover = document.createElement('div');
    popover.id = 'req-hover-popover';
    popover.className = 'pointer-events-none fixed z-50 max-w-md bg-white rounded-xl shadow-xl border p-4 text-sm';
    popover.style.display = 'none';
    popover.style.transition = 'opacity 120ms ease';
    document.body.appendChild(popover);
  }

  let showTimer = null;
  let hideTimer = null;

  function buildPopoverContent(dataset) {
    const lines = [];

    if (dataset.desc) {
      lines.push(`
        <div class="text-xs font-semibold text-blue-500 mb-1">Descrição do RID</div>
        <div class="text-sm text-blue-700 mb-3 leading-snug">${escapeHtmlSimple(dataset.desc)}</div>
      `);
    }

    if (dataset['reqReason']) {
      lines.push(`
        <div class="text-xs font-semibold text-orange-500 mb-1">Motivo da solicitação</div>
        <div class="text-sm text-orange-700 mb-3 leading-snug">${escapeHtmlSimple(dataset['reqReason'])}</div>
      `);
    }

    if (dataset.rejection && dataset.rejection.trim()) {
      lines.push(`
        <div class="text-xs font-semibold text-red-500 mb-1">Motivo da rejeição</div>
        <div class="text-sm text-red-700 leading-snug">${escapeHtmlSimple(dataset.rejection)}</div>
      `);
    }

    if (!lines.length) {
      lines.push('<div class="text-sm text-gray-500">Sem detalhes.</div>');
    }

    return lines.join('');
  }

  function positionPopover(target) {
    const rect = target.getBoundingClientRect();
    const pw = popover.offsetWidth;
    const ph = popover.offsetHeight;
    const margin = 8;

    // tentar acima, senão abaixo
    let top = rect.top - ph - margin;
    let left = rect.left + (rect.width / 2) - (pw / 2);

    if (top < 8) top = rect.bottom + margin;
    const maxLeft = window.innerWidth - pw - 8;
    if (left < 8) left = 8;
    if (left > maxLeft) left = maxLeft;

    popover.style.top = `${Math.max(8, top + window.scrollY)}px`;
    popover.style.left = `${Math.max(8, left + window.scrollX)}px`;
  }

  // attach listeners nas linhas
  const containerInner = document.getElementById('deleteRequestsListInner');
  if (!containerInner) return;
  const rowsEls = containerInner.querySelectorAll('.req-row');

  rowsEls.forEach(el => {
    const ds = {
      desc: el.dataset.desc || '',
      reqReason: el.dataset.reqReason || '',
      rejection: el.dataset.rejection || '',
      status: el.dataset.status || ''
    };

    function onEnter() {
      clearTimeout(hideTimer);
      showTimer = setTimeout(() => {
        popover.innerHTML = buildPopoverContent(ds);
        popover.style.display = 'block';
        popover.style.opacity = '0';
        // repaint para transição
        // eslint-disable-next-line no-unused-expressions
        popover.offsetWidth;
        popover.style.opacity = '1';
        positionPopover(el);
      }, 120);
    }

    function onLeave() {
      clearTimeout(showTimer);
      hideTimer = setTimeout(() => {
        popover.style.opacity = '0';
        setTimeout(() => { popover.style.display = 'none'; }, 140);
      }, 80);
    }

    el.addEventListener('mouseenter', onEnter);
    el.addEventListener('mouseleave', onLeave);
    el.addEventListener('focus', onEnter);
    el.addEventListener('blur', onLeave);
  });

  // fecha popover se rolar a página (bom pra UX)
  document.addEventListener('scroll', () => {
    if (popover && popover.style.display === 'block') {
      popover.style.display = 'none';
      popover.style.opacity = '0';
    }
  }, { passive: true });
}

 function renderAdminDashboard() {

  }

  const openRids = filteredRids.filter(r => r.status === 'EM ANDAMENTO').length;
  const overdueRids = filteredRids.filter(r => r.status === 'VENCIDO').length;

  // 📅 Mês/ano “ativo” no dashboard (se não tiver filtro ainda, usa mês atual)
  const dashMonth = Number(document.getElementById('dashboardMonth')?.value) || (new Date().getMonth() + 1);
  const dashYear  = Number(document.getElementById('dashboardYear')?.value)  || (new Date().getFullYear());

  const toDateSafe = (v) => {
    if (!v) return null;
    if (v instanceof Date) return v;
    if (typeof v.toDate === 'function') return v.toDate();
    const parsed = new Date(v);
    return isNaN(parsed.getTime()) ? null : parsed;

    // ✅ Plugin: risquinho + % fora do doughnut
const doughnutPercentCallouts = {
  id: 'doughnutPercentCallouts',
  afterDatasetsDraw(chart, args, pluginOptions) {
    const { ctx } = chart;
    const dataset = chart.data.datasets?.[0];
    if (!dataset) return;

    const meta = chart.getDatasetMeta(0);
    if (!meta?.data?.length) return;

    const data = dataset.data || [];
    const total = data.reduce((a, b) => a + (Number(b) || 0), 0);
    if (!total) return;

    const fontSize = pluginOptions?.fontSize ?? 12;
    const lineLength = pluginOptions?.lineLength ?? 14;
    const lineGap = pluginOptions?.lineGap ?? 6;
    const minPercent = pluginOptions?.minPercent ?? 3; // não polui com fatia minúscula

    ctx.save();
    ctx.font = `700 ${fontSize}px Arial`;
    ctx.fillStyle = pluginOptions?.textColor ?? '#374151'; // cinza escuro
    ctx.strokeStyle = pluginOptions?.lineColor ?? '#9CA3AF'; // cinza
    ctx.lineWidth = pluginOptions?.lineWidth ?? 2;

    meta.data.forEach((arc, i) => {
      const value = Number(data[i]) || 0;
      if (!value) return;

      const percent = (value / total) * 100;
      if (percent < minPercent) return;

      // ponto na borda da fatia
      const angle = (arc.startAngle + arc.endAngle) / 2;
      const r = arc.outerRadius;

      const x0 = arc.x + Math.cos(angle) * r;
      const y0 = arc.y + Math.sin(angle) * r;

      // pontinho fora (risquinho)
      const x1 = arc.x + Math.cos(angle) * (r + lineLength);
      const y1 = arc.y + Math.sin(angle) * (r + lineLength);

      // pequeno “cotovelo” para esquerda/direita
      const isRight = Math.cos(angle) >= 0;
      const x2 = x1 + (isRight ? lineGap : -lineGap);
      const y2 = y1;

      // desenha linha
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      // texto %
      const label = `${Math.round(percent)}%`;
      ctx.textAlign = isRight ? 'left' : 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, x2 + (isRight ? 4 : -4), y2);
    });

    ctx.restore();
  }
};

function startRidsListener(userUid) {
  if (!userUid) return;

  // evita múltiplos listeners
  if (window.unsubscribeRidsListener) {
    try { window.unsubscribeRidsListener(); } catch(e){};
    window.unsubscribeRidsListener = null;
  }

  const tsToMillis = (v) => {
    if (!v) return 0;
    if (typeof v.toMillis === 'function') return v.toMillis();
    return (new Date(v)).getTime();
  };

  // queries que combinam RIDs do público + privado
  const queries = [];
  queries.push(db.collection('rids').where('emitterId', '==', userUid));
  const userCpf = window.currentUserData?.cpf?.trim();
  if (userCpf) queries.push(db.collection('rids').where('emitterCpf', '==', userCpf));
  queries.push(db.collection('rids').where('_importedFrom', '==', 'public-site'));

  // usa onSnapshot em cada query e mescla em memória (tempo real)
  const snapshotsState = {}; // mapa temporário por query index

  function mergeAndPublish() {
    const docs = [];
    Object.values(snapshotsState).forEach(arr => arr.forEach(d => docs.push(d)));
    const mapByRidNumber = new Map();
    const mapById = new Map();

    docs.forEach(doc => {
      const d = doc.data();
      const ridNumber = (d.ridNumber || '').toString().trim();
      const id = doc.id;
      // normaliza objeto
      const payload = { ...d, id };

      const key = ridNumber || id;
      if (key && mapByRidNumber.has(key)) {
        const existing = mapByRidNumber.get(key);
        const existingScore = (Object.keys(existing).length) + (tsToMillis(existing.createdAt) || 0)/1e13;
        const newScore = (Object.keys(payload).length) + (tsToMillis(payload.createdAt) || 0)/1e13;
        if (newScore > existingScore) mapByRidNumber.set(key, payload);
      } else if (key) {
        mapByRidNumber.set(key, payload);
      } else {
        if (!mapById.has(id)) mapById.set(id, payload);
      }
    });

    const combined = [...Array.from(mapByRidNumber.values()), ...Array.from(mapById.values())];

    combined.sort((a,b) => {
      const ta = tsToMillis(a.createdAt) || tsToMillis(a.emissionDate) || 0;
      const tb = tsToMillis(b.createdAt) || tsToMillis(b.emissionDate) || 0;
      return tb - ta;
    });

    // publica globalmente
    window.allRids = combined;
    if (typeof renderRidsListUI === 'function') renderRidsListUI(combined);
    // se você só usa renderSearchPage -> re-renderiza para atualizar contadores
    if (window.currentPage === 'search') renderSearchPage();
  }

  // subscreve cada query
  const unsubscribes = queries.map((q, idx) => {
    const unsub = q.onSnapshot(snap => {
      snapshotsState[idx] = snap.docs;
      mergeAndPublish();
    }, err => {
      console.error('Listener rid query erro:', err);
    });
    return unsub;
  });

  window.unsubscribeRidsListener = function() {
    unsubscribes.forEach(u => u && u());
    window.unsubscribeRidsListener = null;
  };

  // flag pra saber que o listener foi iniciado
  window.allRidsStarted = true;
}

    function renderRidsList(rids) {

  }

  return rids.map(rid => `
    <div class="bg-white rounded-lg shadow-md hover:shadow-lg transition-shadow cursor-pointer p-4"
         onclick="showRidDetails('${rid.id}')">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2">

              ${rid.description.substring(0, 50)}...
            </span>
          </div>

          <div class="w-32">
            <span class="text-sm font-semibold text-gray-800">

            </span>

              ${rid.riskClassification}

   function getStatusColor(status) {
  switch (status) {
    case 'VENCIDO':
      return 'bg-red-200 text-red-800';

    case 'ENCERRADO':
      return 'bg-gray-300 text-gray-800';

    case 'EM ANDAMENTO':
      return 'bg-yellow-200 text-yellow-800';

    case 'CORRIGIDO':
      return 'bg-green-200 text-green-800';

    default:
      return 'bg-gray-200 text-gray-800';
  }
}


    function getRiskColor(risk) {
      switch(risk) {
        case 'BAIXO': case 'Baixo': return 'bg-blue-200 text-blue-800';
        case 'MÉDIO': case 'Médio': return 'bg-yellow-200 text-yellow-800';
        case 'ALTO': case 'Alto': return 'bg-orange-200 text-orange-800';
        case 'CRÍTICO': case 'Crítico': return 'bg-red-200 text-red-800';
        default: return 'bg-gray-200 text-gray-800';
      }
    }

    function searchRids() {
      const text = document.getElementById('searchText')?.value.toLowerCase() || '';
const month = document.getElementById('searchMonth')?.value;
const year = document.getElementById('searchYear')?.value;
const sector = document.getElementById('searchSector')?.value;
const status = document.getElementById('searchStatus')?.value;

let filtered = allRids;

// 🔎 BUSCA POR PALAVRAS-CHAVE (inteligente)
if (text) {

  // normaliza texto (remove acento e caixa)
  const normalize = (str) =>
    (str || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');

  const words = normalize(text).split(' ').filter(Boolean);

  filtered = filtered.filter(r => {

    const content = normalize(`
      ${r.ridNumber}
      ${r.emitterName}
      ${r.location}
      ${r.description}
      ${r.sector}
    `);

    // OR: qualquer palavra encontrada já inclui o RID
    return words.some(word => content.includes(word));
  });
}

// 📅 FILTRO MÊS + ANO
if (month || year) {
  filtered = filtered.filter(r => {
    if (!r.emissionDate) return false;
    const d = r.emissionDate.toDate();

    if (month && d.getMonth() + 1 !== Number(month)) return false;
    if (year && d.getFullYear() !== Number(year)) return false;

    return true;
  });
}

// 🏭 SETOR
if (sector) {
  filtered = filtered.filter(r => r.sector === sector);
}

// 📌 STATUS
if (status === 'SEM_LIDER') {
  // 🔥 ignora status real, mostra TODOS sem líder
  filtered = filtered.filter(r =>
    !r.responsibleLeader || r.responsibleLeader === ''
  );
} else if (status) {
  // status normal (EM ANDAMENTO, VENCIDO, CORRIGIDO)
  filtered = filtered.filter(r => r.status === status);
}


// 🔄 ATUALIZA A LISTA
document.getElementById('ridsListContainer').innerHTML =
  renderRidsList(filtered);

 }

const applyLock = () => {
  // Se for developer, NÃO bloqueia nada
  if (typeof isDeveloper === "function" && isDeveloper()) return;

  const allowedNames = new Set([
    "riskClassification",  // Classificação de Risco
    "status",              // Status
    "responsibleLeader",   // Responsável Designado
    "deadline",            // Prazo
    "observations",        // Observações
    "correctiveActions",   // Ações Corretivas
    "conclusion"           // Conclusão
  ]);

  document
    .querySelectorAll(".modal-backdrop input, .modal-backdrop select, .modal-backdrop textarea")
    .forEach(el => {
      const name = el.getAttribute("name") || "";

      // libera somente os campos permitidos
      if (allowedNames.has(name)) {
        el.disabled = false;
        el.readOnly = false;
        el.style.pointerEvents = "auto";
        el.classList.remove("bg-gray-100", "cursor-not-allowed");
        return;
      }

      el.disabled = true;
el.readOnly = true;

// ✅ textarea: deixa clicar/selecionar e garante reflow bom
if (el.tagName === "TEXTAREA") {
  el.style.pointerEvents = "auto";
} else {
  el.style.pointerEvents = "none";
}

el.classList.add("bg-gray-100", "cursor-not-allowed");
    });
};

// executa agora e reforça após render (somente admin)
applyLock();
requestAnimationFrame(applyLock);
setTimeout(applyLock, 50);
    }

async function confirmarEncerramento(ridId) {
  const motivo = document.getElementById('encerramentoMotivo')?.value?.trim();

  if (!motivo || motivo.length < 5) {
    showToast('Informe um motivo válido para encerrar o RID', 'error');
    return;
  }

  const updates = {
    status: 'ENCERRADO',

    // 🔥 motivo vira ação corretiva oficial
    correctiveActions: motivo,

    conclusionDate: firebase.firestore.FieldValue.serverTimestamp()
  };

  const success = await updateRid(ridId, updates);

  if (success) {
    document
      .querySelectorAll('.modal-backdrop')
      .forEach(m => m.remove());

    showToast('RID encerrado com sucesso');
  }
}
function cancelarEncerramento(button) {
  button.closest('.modal-backdrop')?.remove();

  if (window._encerramentoSelect) {
    window._encerramentoSelect.value = 'EM ANDAMENTO';
    window._encerramentoSelect = null;
  }
}

    async function syncLeadersPublic() {
  if (!isAdmin() && !isDeveloper()) return;

  try {
    const leaders = allUsers.filter(
      u => u.isAdmin === true || u.isDeveloper === true
    );

    const batch = db.batch();

    leaders.forEach(leader => {
      const ref = db.collection('leaders_public').doc(leader.id);
      batch.set(ref, {
        name: leader.name,
        sector: leader.sector || '',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    });

    await batch.commit();
  } catch (e) {
    console.warn('Erro ao sincronizar leaders_public');
  }
}

  async function approveRidDeletion(requestId, ridId, requesterId) {
  try {
    // 🔒 trava a UI na aba Solicitações durante a aprovação
window.currentPage = 'requests';

    const rid = allRids.find(r => r.id === ridId);

    const ridRef = db.collection('rids').doc(ridId);
    const ridSnap = await ridRef.get();
    const ridData = ridSnap.data() || {};

    // ✅ pega o motivo digitado pelo líder na solicitação (deleteRequests.reason)
const reqSnap = await db.collection('deleteRequests').doc(requestId).get();
const reqData = reqSnap.exists ? (reqSnap.data() || {}) : {};
const ridDeletionReason = (reqData.reason || '').trim() || 'Motivo não informado';


    const previousObs = ridData?.observations || '';

    const deleteNote =
`[${new Date().toLocaleDateString()}] RID removido do sistema
Motivo: ${ridDeletionReason}
Removido por: ${currentUserData?.name || 'DEV'}`;

    // ✅ Mantém a "funcionalidade de e-mail" sem usar updates:
    // reseta flags de envio (útil se você tiver lógica de reativar/reverter exclusão)
    // e evita ficar "travado" com emailSent=true
    await ridRef.update({
      // exclusão lógica
      deleted: true,
      status: 'EXCLUIDO',
      deletedAt: firebase.firestore.FieldValue.serverTimestamp(),

      // ✅ quem aprovou/excluiu foi o DEV logado (não o requester)
      deletedBy: {
        uid: currentUser?.uid || null,
        name: currentUserData?.name || 'DEV',
        role: isDeveloper() ? 'DEVELOPER' : 'ADMIN'
      },

      deleteReason: ridDeletionReason,

      // ✅ histórico no campo observações
      observations: previousObs
        ? previousObs + '\n\n' + deleteNote
        : deleteNote,

      // ✅ reset de e-mail (mantém comportamento saudável do sistema)
      emailSent: false,
      emailSentAt: null,

      // opcional: se você usa esse campo pra controlar notificação de líder
      // deixe null pra forçar nova avaliação caso o RID "volte" algum dia
      lastNotifiedLeader: null
    });

    // ✅ marca solicitação como aprovada (com auditoria)
    await db.collection('deleteRequests').doc(requestId).update({
      status: 'approved',
      reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
      reviewedBy: {
        uid: currentUser?.uid || null,
        name: currentUserData?.name || 'DEV'
      }
    });

    // ✅ notifica quem solicitou (requesterId)
    await createNotification(requesterId, {
      type: 'request_approved',
      ridId: '',
      ridNumber: rid?.ridNumber || '',
      title: 'Solicitação Aprovada',
      message: `Sua solicitação de exclusão do RID #${rid?.ridNumber || 'N/A'} foi aprovada`,
      ridLocation: null,
      deadline: null
    });
// ✅ garante que a UI volta pra Solicitações
window.currentPage = 'requests';

    renderRequestsPage();
    showToast('RID excluído com sucesso!');
  } catch (error) {
    showToast('Erro ao excluir RID: ' + error.message, 'error');
  }
}

    const m = month ? Number(month) : now.getMonth() + 1;

    filtered = filtered.filter(r => {

    function renderReportsPage() {

     const now = new Date();

const selectedYear  = yearEl?.value  ? Number(yearEl.value)  : currentYear;

// helpers locais (bem seguros)
const toDateSafe = (v) => {
  if (!v) return null;
  if (v instanceof Date) return v;
  if (typeof v.toDate === 'function') return v.toDate(); // Firestore Timestamp
  const parsed = new Date(v);
  return isNaN(parsed.getTime()) ? null : parsed;
};

const isInMonthYear = (d, m, y) => !!d && (d.getMonth() + 1) === m && d.getFullYear() === y;
const isBeforeMonthYear = (d, m, y) => {
  if (!d) return false;
  const dm = d.getMonth() + 1;
  const dy = d.getFullYear();
  return (dy < y) || (dy === y && dm < m);
};

// 🔵 LISTA A: emitidos no mês selecionado (qualquer status)
const reportMonthRids = allRids
  .filter(r => !r.deleted)
  .filter(r => {

    return isInMonthYear(d, selectedMonth, selectedYear);
  });

  .filter(r => !r.deleted)

   const emission = toDateSafe(r.emissionDate);

// 🚫 garante que NÃO é do mês atual

if (!isBeforeMonthYear(emission, selectedMonth, selectedYear)) return false;


    const st = String(r.status || '').toUpperCase();
    if (st !== 'CORRIGIDO' && st !== 'ENCERRADO') return false;

    const concl = toDateSafe(r.conclusionDate);
    return isInMonthYear(concl, selectedMonth, selectedYear);
  });

// ✅ lista final da tabela com separador
const reportDisplayRids = resolvedPreviousInMonth.length > 0
  ? [
      ...reportMonthRids,
      { __separator: true, label: 'RIDs de meses anteriores resolvidos neste mês' },
      ...resolvedPreviousInMonth
    ]
  : [...reportMonthRids];

 function filterReports() {
  const month = document.getElementById('reportMonth')?.value;
  const year = document.getElementById('reportYear')?.value;
  const sector = document.getElementById('reportSector')?.value;

  const now = new Date();
  const currentMonth = now.getMonth() + 1;
  const currentYear = now.getFullYear();

  const selectedMonth = month ? Number(month) : currentMonth;
  const selectedYear  = year  ? Number(year)  : currentYear;

  const toDateSafe = (v) => {
    if (!v) return null;
    if (v instanceof Date) return v;
    if (typeof v.toDate === 'function') return v.toDate();
    const parsed = new Date(v);
    return isNaN(parsed.getTime()) ? null : parsed;
  };

  const isInMonthYear = (d, m, y) => !!d && (d.getMonth() + 1) === m && d.getFullYear() === y;
  const isBeforeMonthYear = (d, m, y) => {
    if (!d) return false;
    const dm = d.getMonth() + 1;
    const dy = d.getFullYear();
    return (dy < y) || (dy === y && dm < m);
  };

  // base segura
  let base = allRids.filter(r => !r.deleted);
  if (sector) base = base.filter(r => r.sector === sector);

  // 🔵 Seção A: emitidos no mês selecionado (qualquer status)
  const listA = base.filter(r => {
    const emission = toDateSafe(r.emissionDate);
    return isInMonthYear(emission, selectedMonth, selectedYear);
  });

  // 🟡 Seção B: emitidos antes, resolvidos no mês selecionado
  const listB = base.filter(r => {
    const emission = toDateSafe(r.emissionDate);
    if (!isBeforeMonthYear(emission, selectedMonth, selectedYear)) return false;

    const st = String(r.status || '').toUpperCase();
    if (st !== 'CORRIGIDO' && st !== 'ENCERRADO') return false;

    const concl = toDateSafe(r.conclusionDate);
    return isInMonthYear(concl, selectedMonth, selectedYear);
  });

  const finalList = listB.length > 0
    ? [
        ...listA,
        { __separator: true, label: 'RIDs de meses anteriores resolvidos neste mês' },
        ...listB
      ]
    : [...listA];

  document.getElementById('reportTableBody').innerHTML = renderReportRows(finalList);
}

      const padTop = 16;      // espaço acima da linha
      const padBottom = 20;   // reserva maior espaço para os labels
      const usableW = cw - padLeft - padRight;
      const usableH = ch - padTop - padBottom;

      // calcular pontos (linha desenhada dentro do usableH)
      const maxV = Math.max(1, ...(values.length ? values : [1]));
      const pts = values.map((v, i) => {
        const x = padLeft + (i / Math.max(1, values.length - 1)) * usableW;
        const y = padTop + (1 - (v / maxV)) * usableH;
        return { x, y, v, i };
      });

      // desenha área preenchida (apenas até a base da área útil, não sobre os labels)
      if (pts.length > 0) {
        ctx.beginPath();
        ctx.moveTo(pts[0].x, padTop + usableH); // base da área (não até ch)
        pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(pts[pts.length - 1].x, padTop + usableH);
        ctx.closePath();
        ctx.fillStyle = 'rgba(59,130,246,0.06)';
        ctx.fill();
      }

      // linha
      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#2563EB';
      pts.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();

      // pontos
      pts.forEach(p => {
        ctx.beginPath();
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#2563EB';
        ctx.lineWidth = 1.5;
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      });

      // labels X (meses) — posicionados abaixo da área útil, dentro do padBottom
      ctx.fillStyle = '#6b7280';
      ctx.font = '11px system-ui, -apple-system, "Segoe UI", Roboto';
      labels.forEach((lbl, i) => {
        const p = pts[i];
        if (!p) return;
        ctx.textAlign = 'center';
        // y dos labels: padTop + usableH + (padBottom * 0.6) para ficar visível e distante da linha
        const labelY = padTop + usableH + Math.max(10, padBottom * 0.6);
        ctx.fillText(lbl, p.x, labelY);
      });

      // guarda pontos calculados no canvas para o handler de mouse
      canvas.__yearPoints = pts;
      // e guarda rect usado (para referência se precisar)
      canvas.__yearRect = { left: rect.left, top: rect.top, width: rect.width, height: rect.height, DPR };
    }

    // inicial desenha
    draw();

    // ---- tooltip mouse handlers ----
    const hitRadius = 8; // pixels sensíveis ao hover
    let activeIdx = -1;

    function onMove(e) {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const pts = canvas.__yearPoints || [];
      let nearest = null;
      let nearestDist = Infinity;

      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        const dx = x - p.x;
        const dy = y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < nearestDist) {
          nearestDist = d;
          nearest = p;
        }
      }

      if (nearest && nearestDist <= hitRadius) {
        // entrou em um ponto
        if (activeIdx !== nearest.i) {
          activeIdx = nearest.i;
          // atualiza conteúdo do tooltip
          const monthLabel = labels[nearest.i] || ('Mês ' + (nearest.i + 1));
          const value = nearest.v || 0;
          tooltip.innerHTML = `<strong style="display:block; font-weight:700;">${monthLabel}</strong><span style="display:block; font-size:12px; opacity:0.95;">${value} corrigido${value !== 1 ? 's' : ''}</span>`;
        }
        // posiciona tooltip próximo ao cursor (com offset)
        const pageX = e.clientX;
        const pageY = e.clientY;
        // evita que o tooltip saia da tela pelos lados
        const tipRect = tooltip.getBoundingClientRect();
        let left = pageX;
        let top = pageY - 12;
        const margin = 8;
        if (left - tipRect.width / 2 < margin) left = margin + tipRect.width / 2;
        if (left + tipRect.width / 2 > window.innerWidth - margin) left = window.innerWidth - margin - tipRect.width / 2;
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
        tooltip.style.opacity = '1';
      } else {
        // saiu do ponto
        activeIdx = -1;
        tooltip.style.opacity = '0';
      }
    }

    function onLeave() {
      tooltip.style.opacity = '0';
      activeIdx = -1;
    }

    // anexa handlers (removendo duplicatas)
    canvas.removeEventListener('mousemove', canvas.__yearMoveHandler || (()=>{}));
    canvas.removeEventListener('mouseleave', canvas.__yearLeaveHandler || (()=>{}));
    canvas.__yearMoveHandler = onMove;
    canvas.__yearLeaveHandler = onLeave;
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseleave', onLeave);

    // redesenhar ao redimensionar (debounce)
    let resizeTimer = null;
    const onResize = () => {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        draw();
      }, 150);
    };
    window.removeEventListener('resize', canvas.__yearResizeHandler || (()=>{}));
    canvas.__yearResizeHandler = onResize;
    window.addEventListener('resize', onResize);
  } catch (e) {
    console.warn('Erro ao desenhar sparkline anual com tooltip:', e);
  }
})();

}

// helper de escape (substitui a versão anterior)
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}}

// === Reincidência: helpers + compute + render ===

function normalizeTextForFingerprint(text) {
  if (!text) return '';
  return String(text)
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')    // remove acentos
    .replace(/[^a-z0-9\s]/g, ' ')      // remove pontuação
    .replace(/\s+/g, ' ')
    .trim();
}

function wordsSet(text) {
  const s = normalizeTextForFingerprint(text);
  if (!s) return new Set();
  return new Set(s.split(' ').filter(w => w.length > 2));
}

function jaccard(aSet, bSet) {
  if (!aSet || !bSet) return 0;
  const a = Array.from(aSet);
  const inter = a.filter(x => bSet.has(x)).length;
  const union = new Set([...a, ...Array.from(bSet)]).size;
  return union === 0 ? 0 : inter / union;
}

/*
 computeReincidencia:
 - rids: array de RIDs
 - opts: { threshold: number (0..1), minClusterSize: integer }
 Retorna: { sector: [ { clusterKey, count, rids: [...] }, ... ] }
*/
function computeReincidencia(rids, opts = {}) {
  const threshold = typeof opts.threshold === 'number' ? opts.threshold : 0.55;
  const minClusterSize = typeof opts.minClusterSize === 'number' ? opts.minClusterSize : 2;
  const clean = (rids || []).filter(r => !r.deleted);

  const bySector = {};
  clean.forEach(r => {
    const sector = r.sector || 'SEM SETOR';
    if (!bySector[sector]) bySector[sector] = [];
    bySector[sector].push(r);
  });

  const result = {};
  Object.keys(bySector).forEach(sector => {
    const list = bySector[sector];
    const clusters = [];

    list.forEach(rid => {
      const desc = rid.description || rid.ridDescription || rid.riskDescription || '';
      const wset = wordsSet(desc);
      let placed = false;
      for (const c of clusters) {
        const score = jaccard(wset, c.fingerprint);
        if (score >= threshold) {
          c.rids.push(rid);
          c.fingerprint = new Set([...c.fingerprint, ...wset]);
          placed = true;
          break;
        }
      }
      if (!placed) clusters.push({ fingerprint: wset, rids: [rid] });
    });

    const clustersFiltered = clusters
      .map((c, i) => ({ clusterKey: 'c' + i, count: c.rids.length, rids: c.rids }))
      .filter(c => c.count >= minClusterSize)
      .sort((a,b) => b.count - a.count);

    if (clustersFiltered.length > 0) result[sector] = clustersFiltered;
  });

  return result;
}

function escapeHtmlSimple(str){
  if (!str) return '';
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

// renderReincidenciaCard: preenche o HTML do card já presente no DOM
function renderReincidenciaCard() {

    const d = (r.emissionDate && typeof r.emissionDate.toDate === 'function') ? r.emissionDate.toDate() : (r.emissionDate ? new Date(r.emissionDate) : null);
    if (!d || Number.isNaN(d.getTime())) return false;
    return d.getFullYear() === year;
  });

  // se não há RIDs no ano, mostra mensagem
  if (!all || all.length === 0) {
    container.style.display = 'block';
    content.innerHTML = `<div class="muted">Nenhum RID registrado em ${year}.</div>`;
    return;
  }

  // calcula clusters de reincidência por setor (usa computeReincidencia já existente)
  const clustersBySector = computeReincidencia(all, { threshold: 0.55, minClusterSize: 2 });

  if (!clustersBySector || Object.keys(clustersBySector).length === 0) {
    container.style.display = 'block';
    content.innerHTML = `<div class="muted">Nenhuma reincidência significativa detectada em ${year} com os parâmetros atuais.</div>`;
    return;
  }

  // monta contagem mensal: para cada mês (0..11) contamos quantos RIDs que estão em clusters têm emissionMonth=m
  const monthsCountsBySector = {}; // sector -> [12 counts]
  Object.keys(clustersBySector).forEach(sector => {
    const arr = new Array(12).fill(0);
    clustersBySector[sector].forEach(cluster => {
      cluster.rids.forEach(r => {
        const d = (r.emissionDate && typeof r.emissionDate.toDate === 'function') ? r.emissionDate.toDate() : (r.emissionDate ? new Date(r.emissionDate) : null);
        if (!d || Number.isNaN(d.getTime())) return;
        const m = d.getMonth(); // 0..11
        arr[m] = arr[m] + 1;
      });
    });
    monthsCountsBySector[sector] = arr;
  });

  // helper: calcula tendência e desde que mês (retorna { direction: 'increase'|'decrease'|'stable', sinceMonthIndex: 0..11 or null })
  function analyzeTrend(counts) {
    // counts: array length 12
    const diffs = new Array(12).fill(0);
    for (let i = 1; i < 12; i++) diffs[i] = counts[i] - counts[i-1];

    // encontra último índice com diff != 0
    let lastIdx = -1;
    for (let i = 11; i >= 1; i--) if (diffs[i] !== 0) { lastIdx = i; break; }

    if (lastIdx === -1) return { direction: 'stable', sinceMonthIndex: null };

    const lastSign = Math.sign(diffs[lastIdx]); // 1 or -1
    // varre pra trás até encontrar sinal oposto
    let k = lastIdx;
    while (k >= 1) {
      if (diffs[k] === 0 || Math.sign(diffs[k]) === lastSign) { k--; continue; }
      // sinal oposto encontrado
      break;
    }
    // se k < 1 significa que não encontrou oposto => tendência é desde o início do ano
    const sinceMonthIndex = (k < 1) ? 1 : (k + 1); // month index where change started: month number = sinceMonthIndex (1..11) corresponds to month (sinceMonthIndex) -> we'll report month name of sinceMonthIndex+0
    // Note: sinceMonthIndex here refers to the month index in diffs where first same-sign diff starts; to get readable month (1..12) we use sinceMonthIndex (month that had the first change to this trend) + 0 gives the month number (month after diff's previous).
    return { direction: lastSign > 0 ? 'increase' : 'decrease', sinceMonthIndex: sinceMonthIndex }; // sinceMonthIndex between 1..11
  }

  const monthNames = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  // monta HTML compacto por setor, calcula totals para ranking se quiser
  const sectorsSorted = Object.keys(monthsCountsBySector).sort((a,b) => {
    const tA = monthsCountsBySector[a].reduce((s,x)=>s+x,0);
    const tB = monthsCountsBySector[b].reduce((s,x)=>s+x,0);
    return tB - tA;
  });

  let html = '';
  sectorsSorted.forEach(sector => {
    const counts = monthsCountsBySector[sector];
    const total = counts.reduce((s,x)=>s+x,0);
    const trend = analyzeTrend(counts);

    // sparkbars: vamos transformar counts em percentuais relativos ao max do ano pra esse setor
    const maxCount = Math.max(...counts, 1);
    const bars = counts.map(c => {
      const pct = Math.round((c / maxCount) * 100); // 0..100
      return `<div class="month-bar"><i style="width:${pct}%;"></i></div>`;
    }).join('');

    // pega top cluster summary (como sample)
    const top = clustersBySector[sector][0];
    const sampleDesc = escapeHtmlSimple((top.rids[0].description || top.rids[0].ridDescription || '').slice(0,160));

    // pills: mostra até 4 ids (ordena por data)
    const pills = top.rids
      .slice()
      .sort((x,y) => {
        const dx = (x.emissionDate && typeof x.emissionDate.toDate === 'function') ? x.emissionDate.toDate() : new Date(x.emissionDate || 0);
        const dy = (y.emissionDate && typeof y.emissionDate.toDate === 'function') ? y.emissionDate.toDate() : new Date(y.emissionDate || 0);
        return dy - dx;
      })
      .slice(0,4)
      .map(r => {
        const num = r.ridNumber || r.id || '—';
        if (typeof window.showRidDetails === 'function') {
          return `<a class="rid-pill" href="javascript:void(0)" onclick="showRidDetails('${r.id}')" title="Abrir RID ${escapeHtmlSimple(num)}">${escapeHtmlSimple(num)}</a>`;
        }
        return `<button class="rid-pill" onclick="(function(){navigator.clipboard?.writeText('${escapeHtmlSimple(String(num))}'); this.innerText='copiado'; setTimeout(()=>this.innerText='${escapeHtmlSimple(String(num))}',900) })()">${escapeHtmlSimple(num)}</button>`;
      }).join(' ');

    // trend text
    let trendText = '';
    if (trend.direction === 'stable') trendText = 'Sem variação recente';
    else {
      // sinceMonthIndex is index in diffs (1..11) representing change from month index -> interpret "desde <month>"
      // we want to say "queda desde <monthName>" meaning the month where the change became visible (month number = sinceMonthIndex+0 ?)
      const monthIdx = trend.sinceMonthIndex; // 1..11
      const readableMonth = monthNames[Math.max(0, Math.min(11, monthIdx))];
      trendText = `${trend.direction === 'increase' ? 'Aumento' : 'Queda'} desde ${readableMonth}`;
    }

    html += `
      <div class="recurrence-row" data-sector="${escapeHtmlSimple(sector)}">
        <div class="recurrence-left">
          <div class="sector-name">${escapeHtmlSimple(sector)}</div>
          <div class="occurrences">Ocorrências semelhantes: <strong>${top.count}</strong></div>
          <div class="sample">${sampleDesc}</div>
        </div>

        <div class="recurrence-right">
          <div style="font-size:11px;color:#475569;margin-bottom:4px;">${trendText}</div>
          <div class="month-spark" aria-hidden="true">${bars}</div>
          <div style="margin-top:6px;">${pills}</div>
        </div>
      </div>
    `;
  });

  content.innerHTML = html;
  container.style.display = 'block';
}

function startRidHistoryListener() {
  // cancela listener anterior se existir
  if (window.ridHistoryUnsub) {
    try { window.ridHistoryUnsub(); } catch (e) {}
    window.ridHistoryUnsub = null;
  }

  const db = firebase.firestore(); // assume já inicializado no projeto

  // Ajuste: coleção/exact name -> 'ridHistory'
  // Ajuste: ordena por createdAt (serverTimestamp salvo no add)
  const q = db.collection('ridHistory')
    .orderBy('createdAt', 'desc')
    .limit(200);

  window.ridHistoryUnsub = q.onSnapshot(snapshot => {
    const items = [];
    snapshot.forEach(doc => {
      const d = doc.data();

      // normaliza createdAt para Date
      let ts = null;
      if (d.createdAt) {
        if (typeof d.createdAt.toDate === 'function') {
          ts = d.createdAt.toDate();
        } else if ('seconds' in d.createdAt) {
          ts = new Date(Number(d.createdAt.seconds) * 1000);
        } else {
          // tenta parsear se for string/number
          const n = Number(d.createdAt);
          ts = !isNaN(n) ? new Date(n) : new Date(String(d.createdAt));
        }
      } else {
        ts = new Date();
      }

      items.push({
        id: doc.id,
        ridId: d.ridId || d.rid || '—',
        ridNumber: d.ridNumber || (d.ridNumber === 0 ? '0' : (d.ridNumber || '—')),
        emitterName: d.emitterName || d.emitter || '—',
        changedBy: (d.changedBy && (d.changedBy.name || d.changedBy.uid)) ? (d.changedBy.name || d.changedBy.uid) : (d.changedByName || d.user || 'Desconhecido'),
        createdAt: ts,
        raw: d
      });
    });

    // atualiza a variável global e renderiza
    allRidHistory = items;
    try { renderRidHistoryPage(); } catch (e) { console.error('Erro renderizando histórico:', e); }
  }, err => {
    console.error('Erro listener ridHistory', err);
    if (typeof showToast === 'function') {
      showToast('Erro ao conectar histórico de alterações: ' + (err.message || err), 'error');
    } else {
      // fallback visual / console
      console.warn('Erro ao conectar histórico de alterações:', err);
    }
  });
}
